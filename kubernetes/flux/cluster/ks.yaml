---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-meta
  namespace: &namespace flux-system
spec:
  decryption:
    provider: sops
  interval: 1h
  path: ./kubernetes/flux/meta
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  decryption:
    provider: sops
  dependsOn:
    - name: cluster-meta
      namespace: flux-system
  interval: 1h
  path: ./kubernetes/apps
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
  patches:
    - # Defaults applied to every child Kustomization
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          prune: true
          timeout: 5m
          decryption:
            provider: sops
          sourceRef:
            kind: GitRepository
            name: flux-system
            namespace: flux-system
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
    - # cilium CRD installation needs extra time
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: cilium
        spec:
          timeout: 15m
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
        name: cilium
    - # alertmanager-discord-bot sources from a different GitRepository
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: alertmanager-discord-bot
        spec:
          sourceRef:
            kind: GitRepository
            name: homelab
            namespace: flux-system
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
        name: alertmanager-discord-bot
