---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
patches:
  - target:
      kind: Namespace
      name: not-used
    patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: not-used
        labels:
          pod-security.kubernetes.io/enforce: privileged
resources:
  - ./cloudnative-pg/ks.yaml
  - ./authentik/ks.yaml
  - ./wazuh/ks.yaml
components:
  - ../../components/common
