---
apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-cloudflare-bouncer-config
  namespace: security
data:
  crowdsec-cloudflare-bouncer.yaml: |
    crowdsec_lapi_url: http://crowdsec-service.security.svc.cluster.local:8080/
    crowdsec_lapi_key: $${API_KEY}
    crowdsec_update_frequency: 10s
    cloudflare_config:
      accounts:
        - id: $${CF_ACCOUNT_ID}
          token: $${CF_API_TOKEN}
          ip_list_prefix: crowdsec
          default_action: managed_challenge
          zones:
            - actions:
                - managed_challenge
              zone_id: $${CF_ZONE_ID}
      update_frequency: 30s
    daemon: false
    log_mode: stdout
    log_level: info
    prometheus:
      enabled: true
      listen_addr: 0.0.0.0
      listen_port: 2112
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec-cloudflare-bouncer
  namespace: security
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: bjw-s-app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      cloudflare-bouncer:
        containers:
          app:
            image:
              repository: docker.io/crowdsecurity/cloudflare-bouncer
              tag: v0.3.0
            env:
              API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: crowdsec-bouncer-secrets
                    key: CLOUDFLARE_BOUNCER_LAPI_KEY
              CF_ACCOUNT_ID:
                valueFrom:
                  secretKeyRef:
                    name: crowdsec-bouncer-secrets
                    key: CF_ACCOUNT_ID
              CF_API_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: crowdsec-bouncer-secrets
                    key: CF_API_TOKEN
              CF_ZONE_ID:
                valueFrom:
                  secretKeyRef:
                    name: crowdsec-bouncer-secrets
                    key: CF_ZONE_ID
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
    persistence:
      config:
        type: configMap
        name: crowdsec-cloudflare-bouncer-config
        globalMounts:
          - path: /etc/crowdsec/bouncers/crowdsec-cloudflare-bouncer.yaml
            subPath: crowdsec-cloudflare-bouncer.yaml
            readOnly: true
