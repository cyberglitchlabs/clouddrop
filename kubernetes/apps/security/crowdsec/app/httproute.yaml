---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crowdsec-blocklist-mirror
  namespace: security
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  parentRefs:
    - name: internal
      namespace: kube-system
      sectionName: https
  hostnames:
    - crowdsec-mirror.${SECRET_DOMAIN}
  rules:
    - backendRefs:
        - name: crowdsec-blocklist-mirror
          port: 8080
