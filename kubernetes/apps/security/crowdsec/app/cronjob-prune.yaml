---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crowdsec-prune
  namespace: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crowdsec-prune
  namespace: security
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crowdsec-prune
  namespace: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crowdsec-prune
subjects:
  - kind: ServiceAccount
    name: crowdsec-prune
    namespace: security
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: crowdsec-prune
  namespace: security
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: crowdsec-prune
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: prune
              image: bitnami/kubectl:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
              command:
                - /bin/sh
                - -c
                - |
                  POD=$(kubectl get pod -n security -l type=lapi -o jsonpath='{.items[0].metadata.name}')
                  kubectl exec -n security "$POD" -- cscli machines prune --force
