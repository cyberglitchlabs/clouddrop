---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crowdsec-cilium-bouncer
  namespace: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crowdsec-cilium-bouncer
rules:
  - apiGroups: ["cilium.io"]
    resources: ["ciliumclusterwidenetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crowdsec-cilium-bouncer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crowdsec-cilium-bouncer
subjects:
  - kind: ServiceAccount
    name: crowdsec-cilium-bouncer
    namespace: security
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec-cilium-bouncer
  namespace: security
  labels:
    app.kubernetes.io/name: crowdsec-cilium-bouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crowdsec-cilium-bouncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crowdsec-cilium-bouncer
    spec:
      serviceAccountName: crowdsec-cilium-bouncer
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: crowdsec-cilium-bouncer
          image: ghcr.io/hydazz/crowdsec-cilium-bouncer:0.0.3
          env:
            - name: CROWDSEC_URL
              value: http://crowdsec-service.security.svc.cluster.local:8080
            - name: CROWDSEC_BOUNCER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: crowdsec-bouncer-secrets
                  key: CILIUM_BOUNCER_LAPI_KEY
            - name: SYNC_INTERVAL
              value: 30s
            - name: CROWDSEC_TIMEOUT
              value: 1m
            - name: LOG_LEVEL
              value: info
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
