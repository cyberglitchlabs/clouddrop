---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crowdsec-cilium-bouncer
  namespace: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crowdsec-cilium-bouncer
rules:
  - apiGroups: ["cilium.io"]
    resources: ["ciliumclusterwidenetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crowdsec-cilium-bouncer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crowdsec-cilium-bouncer
subjects:
  - kind: ServiceAccount
    name: crowdsec-cilium-bouncer
    namespace: security
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec-cilium-bouncer
  namespace: security
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: bjw-s-app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      serviceAccountName: crowdsec-cilium-bouncer
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
    controllers:
      cilium-bouncer:
        containers:
          app:
            image:
              repository: ghcr.io/hydazz/crowdsec-cilium-bouncer
              tag: 0.0.4
            env:
              CROWDSEC_URL:
                value: http://crowdsec-service.security.svc.cluster.local:8080
              CROWDSEC_BOUNCER_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: crowdsec-bouncer-secrets
                    key: CILIUM_BOUNCER_LAPI_KEY
              SYNC_INTERVAL:
                value: 30s
              CROWDSEC_TIMEOUT:
                value: 1m
              LOG_LEVEL:
                value: info
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
