---
# yaml-language-server: $schema=https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.30
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-postgres
  namespace: security
spec:
  instances: 1
  # Single-instance: no replica to fail over to, so the default PDB would
  # permanently block draining this node. CNPG's official replacement for
  # nodeMaintenanceWindow: https://cloudnative-pg.io/documentation/current/kubernetes_upgrade/
  enablePDB: false

  # Use PostgreSQL 17 (18 not yet available in CloudNativePG images)
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: 256MB

  storage:
    size: 10Gi
    storageClass: qnap-nfs

  monitoring:
    enablePodMonitor: true
