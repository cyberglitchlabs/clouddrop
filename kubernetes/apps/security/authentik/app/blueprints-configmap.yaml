---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: security
data:
  email-mapping.yaml: |
    version: 1
    metadata:
      name: custom-email-mapping
    entries:
      - model: authentik_providers_oauth2.scopemapping
        state: present
        identifiers:
          name: Custom Email (verified)
        attrs:
          name: Custom Email (verified)
          scope_name: email
          expression: |
            return {
                "email": request.user.email,
                "email_verified": True
            }

  providers.yaml: |
    version: 1
    metadata:
      name: sso-providers
    entries:
      # --- Romm ---
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Romm OIDC Provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_id: !Env [ROMM_CLIENT_ID]
          client_secret: !Env [ROMM_CLIENT_SECRET]
          redirect_uris:
            - matching_mode: strict
              url: "https://romm.cyberglitch.systems/api/oauth/openid"
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Internal JWT Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Custom Email (verified)"]]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30

      # --- Audiobookshelf ---
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Provider for audiobookshelf
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_id: !Env [AUDIOBOOKSHELF_CLIENT_ID]
          client_secret: !Env [AUDIOBOOKSHELF_CLIENT_SECRET]
          redirect_uris:
            - matching_mode: strict
              url: "https://audiobookshelf.cyberglitch.systems/audiobookshelf/auth/openid/callback"
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Internal JWT Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Custom Email (verified)"]]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30

      # --- Grafana ---
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Provider for Grafana
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_id: !Env [GRAFANA_CLIENT_ID]
          client_secret: !Env [GRAFANA_CLIENT_SECRET]
          redirect_uris:
            - matching_mode: strict
              url: "https://grafana.cyberglitch.systems/login/generic_oauth"
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Internal JWT Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Custom Email (verified)"]]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30

      # --- Mealie ---
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Provider for Mealie
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_id: !Env [MEALIE_CLIENT_ID]
          client_secret: !Env [MEALIE_CLIENT_SECRET]
          redirect_uris:
            - matching_mode: strict
              url: "https://mealie.cyberglitch.systems/login"
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Internal JWT Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Custom Email (verified)"]]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30

      # --- Immich ---
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Provider for Immich
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_id: !Env [IMMICH_CLIENT_ID]
          client_secret: !Env [IMMICH_CLIENT_SECRET]
          redirect_uris:
            - matching_mode: strict
              url: "https://immich.cyberglitch.systems/auth/login"
            - matching_mode: strict
              url: "https://immich.cyberglitch.systems/user-settings"
            - matching_mode: strict
              url: "app.immich:///oauth-callback"
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Internal JWT Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Custom Email (verified)"]]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30

      # --- Open-WebUI ---
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Provider for Open-WebUI
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_id: !Env [OPEN_WEBUI_CLIENT_ID]
          client_secret: !Env [OPEN_WEBUI_CLIENT_SECRET]
          redirect_uris:
            - matching_mode: strict
              url: "https://openwebui.cyberglitch.systems/oauth/oidc/callback"
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Internal JWT Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Custom Email (verified)"]]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30

      # --- Actual Budget ---
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Provider for Actual Budget
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_id: !Env [ACTUAL_BUDGET_CLIENT_ID]
          client_secret: !Env [ACTUAL_BUDGET_CLIENT_SECRET]
          redirect_uris:
            - matching_mode: strict
              url: "https://budget.cyberglitch.systems/openid/callback"
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Internal JWT Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Custom Email (verified)"]]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30

  applications.yaml: |
    version: 1
    metadata:
      name: sso-applications
    entries:
      - model: authentik_core.application
        state: present
        identifiers:
          slug: romm
        attrs:
          name: Romm
          slug: romm
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, "Romm OIDC Provider"]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: audiobookshelf
        attrs:
          name: Audiobookshelf
          slug: audiobookshelf
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, "Provider for audiobookshelf"]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          slug: grafana
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, "Provider for Grafana"]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: mealie
        attrs:
          name: Mealie
          slug: mealie
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, "Provider for Mealie"]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: immich
        attrs:
          name: Immich
          slug: immich
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, "Provider for Immich"]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: open-webui
        attrs:
          name: Open-WebUI
          slug: open-webui
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, "Provider for Open-WebUI"]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: actual-budget
        attrs:
          name: Actual Budget
          slug: actual-budget
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, "Provider for Actual Budget"]]
