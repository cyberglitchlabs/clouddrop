---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wazuh-dashboard
  namespace: security
spec:
  parentRefs:
    - name: external
      namespace: kube-system
      sectionName: https
  hostnames:
    - wazuh.${SECRET_DOMAIN}
  rules:
    - backendRefs:
        - name: wazuh-dashboard
          port: 5601
