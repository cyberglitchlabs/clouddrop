---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-dashboard-config
  namespace: security
data:
  opensearch_dashboards.yml: |
    server.host: "0.0.0.0"
    server.port: 5601
    opensearch.hosts: ["https://wazuh-indexer:9200"]
    opensearch.ssl.verificationMode: none
    opensearch.ssl.certificateAuthorities: ["/etc/wazuh-dashboard/certs/root-ca.pem"]
    opensearch.requestHeadersAllowlist: ["securitytenant", "Authorization"]
    opensearch_security.multitenancy.enabled: false
    opensearch_security.readonly_mode.roles: ["kibana_read_only"]
    server.ssl.enabled: false
    uiSettings.overrides.defaultRoute: /app/wz-home
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wazuh-dashboard
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-dashboard
  template:
    metadata:
      labels:
        app: wazuh-dashboard
    spec:
      volumes:
        - name: dashboard-certs
          secret:
            secretName: wazuh-dashboard-certs
        - name: dashboard-config
          configMap:
            name: wazuh-dashboard-config
        - name: dashboard-writable
          emptyDir: {}
      containers:
        - name: wazuh-dashboard
          image: wazuh/wazuh-dashboard:4.14.5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          env:
            - name: OPENSEARCH_HOSTS
              value: "https://wazuh-indexer:9200"
            - name: DASHBOARD_USERNAME
              value: "kibanaserver"
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_KIBANASERVER_PASSWORD
            - name: WAZUH_API_URL
              value: "https://wazuh-manager"
            - name: API_USERNAME
              value: "wazuh-wui"
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: WAZUH_API_PASSWORD
          ports:
            - containerPort: 5601
              name: http
          volumeMounts:
            - name: dashboard-writable
              mountPath: /etc/wazuh-dashboard
            - name: dashboard-certs
              mountPath: /etc/wazuh-dashboard/certs/dashboard.pem
              subPath: tls.crt
              readOnly: true
            - name: dashboard-certs
              mountPath: /etc/wazuh-dashboard/certs/dashboard-key.pem
              subPath: tls.key
              readOnly: true
            - name: dashboard-certs
              mountPath: /etc/wazuh-dashboard/certs/root-ca.pem
              subPath: ca.crt
              readOnly: true
            - name: dashboard-config
              mountPath: /usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
              subPath: opensearch_dashboards.yml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-dashboard
  namespace: security
spec:
  selector:
    app: wazuh-dashboard
  ports:
    - name: http
      port: 5601
      targetPort: 5601
