---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-dashboard-config
  namespace: security
data:
  opensearch_dashboards.yml: |
    server.host: 0.0.0.0
    server.port: 5601
    opensearch.hosts: https://wazuh-indexer:9200
    opensearch.ssl.verificationMode: certificate
    opensearch.ssl.certificateAuthorities:
      - /usr/share/wazuh-dashboard/certs/ca.crt
    opensearch.ssl.certificate: /usr/share/wazuh-dashboard/certs/tls.crt
    opensearch.ssl.key: /usr/share/wazuh-dashboard/certs/tls.key
    opensearch.username: kibanaserver
    opensearch.password: ${INDEXER_KIBANASERVER_PASSWORD}
    opensearch_security.multitenancy.enabled: false
    opensearch_security.readonly_mode.roles:
      - kibana_read_only
    server.ssl.enabled: false
    uiSettings.overrides.defaultRoute: /app/wazuh
    opensearch_security.cookie.secure: false
  wazuh.yml: |
    hosts:
      - id: default
        url: https://wazuh-manager
        port: 55000
        username: wazuh-wui
        password: ${WAZUH_API_PASSWORD}
        run_as: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wazuh-dashboard
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-dashboard
  template:
    metadata:
      labels:
        app: wazuh-dashboard
    spec:
      containers:
        - name: wazuh-dashboard
          image: wazuh/wazuh-dashboard:4.14.4
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          env:
            - name: INDEXER_USERNAME
              value: "admin"
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_ADMIN_PASSWORD
            - name: WAZUH_API_URL
              value: "https://wazuh-manager"
            - name: DASHBOARD_USERNAME
              value: "kibanaserver"
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_KIBANASERVER_PASSWORD
            - name: API_USERNAME
              value: "wazuh-wui"
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: WAZUH_API_PASSWORD
          ports:
            - containerPort: 5601
              name: http
          volumeMounts:
            - name: certs
              mountPath: /usr/share/wazuh-dashboard/certs
              readOnly: true
            - name: config
              mountPath: /usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
              subPath: opensearch_dashboards.yml
              readOnly: true
            - name: config
              mountPath: /usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
              subPath: wazuh.yml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /app/wazuh
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 6
      volumes:
        - name: certs
          secret:
            secretName: wazuh-dashboard-certs
        - name: config
          configMap:
            name: wazuh-dashboard-config
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-dashboard
  namespace: security
spec:
  selector:
    app: wazuh-dashboard
  ports:
    - name: http
      port: 5601
      targetPort: 5601
