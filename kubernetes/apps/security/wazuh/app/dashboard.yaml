---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wazuh-dashboard
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-dashboard
  template:
    metadata:
      labels:
        app: wazuh-dashboard
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      volumes:
        - name: dashboard-certs
          secret:
            secretName: wazuh-dashboard-certs
      containers:
        - name: wazuh-dashboard
          image: wazuh/wazuh-dashboard:4.9.2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          env:
            - name: OPENSEARCH_HOSTS
              value: "https://wazuh-indexer:9200"
            - name: INDEXER_USERNAME
              value: "admin"
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_ADMIN_PASSWORD
            - name: DASHBOARD_USERNAME
              value: "kibanaserver"
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_KIBANASERVER_PASSWORD
            - name: SERVER_SSL_ENABLED
              value: "false"
            - name: OPENSEARCH_SSL_CERTIFICATE_AUTHORITIES
              value: /usr/share/wazuh-dashboard/config/certs/root-ca.pem
            - name: WAZUH_API_URL
              value: "https://wazuh-manager"
            - name: API_USERNAME
              value: "wazuh-wui"
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: WAZUH_API_PASSWORD
          ports:
            - containerPort: 5601
              name: http
          volumeMounts:
            - name: dashboard-certs
              mountPath: /usr/share/wazuh-dashboard/config/certs/dashboard.pem
              subPath: tls.crt
              readOnly: true
            - name: dashboard-certs
              mountPath: /usr/share/wazuh-dashboard/config/certs/dashboard-key.pem
              subPath: tls.key
              readOnly: true
            - name: dashboard-certs
              mountPath: /usr/share/wazuh-dashboard/config/certs/root-ca.pem
              subPath: ca.crt
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-dashboard
  namespace: security
spec:
  selector:
    app: wazuh-dashboard
  ports:
    - name: http
      port: 5601
      targetPort: 5601
