---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wazuh-dashboard
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-dashboard
  template:
    metadata:
      labels:
        app: wazuh-dashboard
    spec:
      containers:
        - name: wazuh-dashboard
          image: wazuh/wazuh-dashboard:4.9.2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          env:
            - name: INDEXER_URL
              value: "https://wazuh-indexer:9200"
            - name: INDEXER_USERNAME
              value: "admin"
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_ADMIN_PASSWORD
            - name: DASHBOARD_USERNAME
              value: "kibanaserver"
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_KIBANASERVER_PASSWORD
            - name: WAZUH_API_URL
              value: "https://wazuh-manager"
            - name: API_USERNAME
              value: "wazuh-wui"
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: WAZUH_API_PASSWORD
          ports:
            - containerPort: 5601
              name: http
          volumeMounts:
            - name: certs
              mountPath: /usr/share/wazuh-dashboard/certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /app/wazuh
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 6
      volumes:
        - name: certs
          secret:
            secretName: wazuh-dashboard-certs
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-dashboard
  namespace: security
spec:
  selector:
    app: wazuh-dashboard
  ports:
    - name: http
      port: 5601
      targetPort: 5601
