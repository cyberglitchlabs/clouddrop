---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-ism-policies
  namespace: security
data:
  wazuh-alerts-retention.json: |
    {
      "policy": {
        "policy_id": "wazuh-alerts-retention",
        "description": "Delete wazuh-alerts indices after 90 days",
        "default_state": "retention",
        "states": [
          {
            "name": "retention",
            "actions": [],
            "transitions": [
              { "state_name": "delete", "conditions": { "min_index_age": "90d" } }
            ]
          },
          {
            "name": "delete",
            "actions": [
              { "retry": { "count": 3, "backoff": "exponential", "delay": "1m" }, "delete": {} }
            ],
            "transitions": []
          }
        ],
        "ism_template": [
          { "index_patterns": ["wazuh-alerts-4.x-*"], "priority": 1 }
        ]
      }
    }
  wazuh-statistics-retention.json: |
    {
      "policy": {
        "policy_id": "wazuh-statistics-retention",
        "description": "Delete wazuh-statistics indices after 30 days",
        "default_state": "retention",
        "states": [
          {
            "name": "retention",
            "actions": [],
            "transitions": [
              { "state_name": "delete", "conditions": { "min_index_age": "30d" } }
            ]
          },
          {
            "name": "delete",
            "actions": [
              { "retry": { "count": 3, "backoff": "exponential", "delay": "1m" }, "delete": {} }
            ],
            "transitions": []
          }
        ],
        "ism_template": [
          { "index_patterns": ["wazuh-statistics-*"], "priority": 1 }
        ]
      }
    }
  wazuh-monitoring-retention.json: |
    {
      "policy": {
        "policy_id": "wazuh-monitoring-retention",
        "description": "Delete wazuh-monitoring indices after 30 days",
        "default_state": "retention",
        "states": [
          {
            "name": "retention",
            "actions": [],
            "transitions": [
              { "state_name": "delete", "conditions": { "min_index_age": "30d" } }
            ]
          },
          {
            "name": "delete",
            "actions": [
              { "retry": { "count": 3, "backoff": "exponential", "delay": "1m" }, "delete": {} }
            ],
            "transitions": []
          }
        ],
        "ism_template": [
          { "index_patterns": ["wazuh-monitoring-*"], "priority": 1 }
        ]
      }
    }
  vector-k8s-retention.json: |
    {
      "policy": {
        "policy_id": "vector-k8s-retention",
        "description": "Delete vector-k8s indices after 14 days",
        "default_state": "retention",
        "states": [
          {
            "name": "retention",
            "actions": [],
            "transitions": [
              { "state_name": "delete", "conditions": { "min_index_age": "14d" } }
            ]
          },
          {
            "name": "delete",
            "actions": [
              { "retry": { "count": 3, "backoff": "exponential", "delay": "1m" }, "delete": {} }
            ],
            "transitions": []
          }
        ],
        "ism_template": [
          { "index_patterns": ["vector-k8s-*"], "priority": 1 }
        ]
      }
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wazuh-ism-apply
  namespace: security
  annotations:
    kustomize.toolkit.fluxcd.io/force: "true"
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: apply
          image: curlimages/curl:8.10.1
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_ADMIN_PASSWORD
          volumeMounts:
            - name: policies
              mountPath: /policies
              readOnly: true
          command:
            - sh
            - -c
            - |
              set -eu
              for f in /policies/*.json; do
                id=$(basename "$f" .json)
                echo "applying $id"
                # Use optimistic concurrency: fetch seq_no/primary_term if exists, otherwise create
                existing=$(curl -sk -u "admin:${ADMIN_PASSWORD}" \
                  "https://wazuh-indexer.security.svc.cluster.local:9200/_plugins/_ism/policies/${id}")
                seq=$(echo "$existing" | sed -n 's/.*"_seq_no":\([0-9]*\).*/\1/p')
                pt=$(echo "$existing" | sed -n 's/.*"_primary_term":\([0-9]*\).*/\1/p')
                if [ -n "$seq" ] && [ -n "$pt" ]; then
                  url="https://wazuh-indexer.security.svc.cluster.local:9200/_plugins/_ism/policies/${id}?if_seq_no=${seq}&if_primary_term=${pt}"
                else
                  url="https://wazuh-indexer.security.svc.cluster.local:9200/_plugins/_ism/policies/${id}"
                fi
                code=$(curl -sk -o /tmp/resp -w "%{http_code}" -u "admin:${ADMIN_PASSWORD}" \
                  -X PUT "$url" \
                  -H 'Content-Type: application/json' \
                  --data-binary "@$f")
                echo "$id -> HTTP $code"
                cat /tmp/resp; echo
                case "$code" in
                  200|201) ;;
                  *) exit 1 ;;
                esac
              done
              echo "all ISM policies applied"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: policies
          configMap:
            name: wazuh-ism-policies
