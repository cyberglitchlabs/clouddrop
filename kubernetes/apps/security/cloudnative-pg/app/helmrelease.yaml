---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: security
spec:
  interval: 1h
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.28.2
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    config:
      data:
        ENABLE_INSTANCE_MANAGER_INPLACE_UPDATES: "true"
        CLUSTERS_ROLLOUT_DELAY: "30"
        INSTANCES_ROLLOUT_DELAY: "10"
    monitoring:
      podMonitorEnabled: true
