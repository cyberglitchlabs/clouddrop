---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: juicefs-mounts
  namespace: juicefs
  labels:
    name: juicefs-mounts-monitor
spec:
  namespaceSelector:
    matchNames:
      - juicefs
  selector:
    matchLabels:
      app.kubernetes.io/name: juicefs-mount
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      scheme: http
      interval: 5s
