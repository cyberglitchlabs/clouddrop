---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: juicefs-csi-driver
  namespace: juicefs
spec:
  interval: 1h
  chart:
    spec:
      chart: juicefs-csi-driver
      version: 0.32.0
      sourceRef:
        kind: HelmRepository
        name: juicefs
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Talos kubelet path (default, but explicit for clarity)
    kubeletDir: /var/lib/kubelet

    # Talos rootfs is read-only; skip host paths the driver can't create (e.g. /etc/updatedb.conf)
    immutable: true

    # Reject eviction of in-use mount pods (works alongside the PDB) and
    # validate secrets/PVs at admission time. cert-manager (already running
    # in-cluster) issues the webhook's serving cert so it stays stable across
    # Flux reconciles, instead of the chart's regenerate-on-every-render
    # self-signed cert.
    validatingWebhook:
      enabled: true

    webhook:
      certManager:
        enabled: true

    controller:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 256Mi

    node:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 512Mi

    # Global cache config applied to all mount pods
    globalConfig:
      enabled: true
      mountPodPatch:
        - mountOptions:
            # Write to local cache first, flush async to QuObjects — this is
            # what gives SQLite-friendly local-disk performance
            - writeback
            - cache-dir=/var/jfsCache
            - cache-size=51200
            - free-space-ratio=0.1
          # Chart defaults (1 CPU / 1Gi request, 2 CPU / 5Gi limit) are sized
          # for heavy multi-PVC mount pods; these mount small arr-app config
          # volumes, so trim to actual usage.
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # writeback buffers writes locally before async upload to QuObjects.
          # The chart's default 10s terminationGracePeriodSeconds isn't enough
          # to flush a write burst, so wait for the rawstaging dir to drain
          # before the mount pod is allowed to exit. umount after flush so
          # containerd can kill the sandbox cleanly instead of hanging on FUSE.
          terminationGracePeriodSeconds: 600
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    set +e
                    staging_dir=$(cat $${MOUNT_POINT}/.config | grep 'CacheDir' | cut -d '"' -f 4)/rawstaging/
                    if [ -d "$staging_dir" ]; then
                      while :
                      do
                        staging_files=$(find $staging_dir -type f | head -n 1)
                        if [ -z "$staging_files" ]; then
                          break
                        else
                          sleep 3
                        fi
                      done
                    fi
                    umount -l $${MOUNT_POINT}
                    rmdir $${MOUNT_POINT}
                    exit 0
