---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: juicefs-postgres
  namespace: juicefs
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  primaryUpdateStrategy: supervised
  enableSuperuserAccess: false
  bootstrap:
    initdb:
      database: juicefs
      owner: juicefs
  postgresql:
    parameters:
      max_connections: "50"
      shared_buffers: 128MB
      wal_keep_size: 512MB
      wal_level: logical
  storage:
    size: 5Gi
    storageClass: qnap-nfs
  monitoring:
    enablePodMonitor: true
