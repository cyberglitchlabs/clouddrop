---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: juicefs-postgres
  namespace: juicefs
spec:
  instances: 1
  # Single-instance: no replica to fail over to, so the default PDB would
  # permanently block draining this node. CNPG's official replacement for
  # nodeMaintenanceWindow: https://cloudnative-pg.io/documentation/current/kubernetes_upgrade/
  enablePDB: false
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  enableSuperuserAccess: false
  bootstrap:
    initdb:
      database: juicefs
      owner: juicefs
  postgresql:
    parameters:
      max_connections: "50"
      shared_buffers: 128MB
      wal_keep_size: 512MB
      wal_level: logical
  storage:
    size: 5Gi
    storageClass: qnap-nfs
  monitoring:
    enablePodMonitor: true
