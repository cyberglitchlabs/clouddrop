---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/policy/poddisruptionbudget_v1.json
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: juicefs-mounts
  namespace: juicefs
spec:
  # Protect mount pods during node drains (e.g. Talos upgrades) so they
  # aren't evicted while an application pod still has the volume mounted.
  minAvailable: 100%
  selector:
    matchLabels:
      app.kubernetes.io/name: juicefs-mount
