---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome-builder
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: bjw-s-app-template
    namespace: flux-system
  values:
    controllers:
      esphome-builder:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/esphome/esphome
              tag: "2026.7.0"
            # The image's own entrypoint only routes the `dashboard` subcommand to
            # esphome-device-builder; every other arg falls through to the classic
            # esphome CLI, which doesn't understand --remote-build-only. Bypass the
            # entrypoint and call the binary directly, replicating the cache-dir
            # env vars the stock entrypoint would otherwise set.
            command: ["/bin/sh", "-c"]
            args:
              - |
                export PLATFORMIO_PLATFORMS_DIR=/cache/platformio/platforms
                export PLATFORMIO_PACKAGES_DIR=/cache/platformio/packages
                export PLATFORMIO_CACHE_DIR=/cache/platformio/cache
                export ESPHOME_ESP_IDF_PREFIX=/cache/idf
                export ESPHOME_SDK_NRF_PREFIX=/cache/sdk-nrf
                exec esphome-device-builder --remote-build-only /var/lib/esphome-builder
            env:
              TZ: America/Chicago
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 6055
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 6055
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            # No USER directive in esphome/esphome's Dockerfile, so the image runs as
            # root by default (needed for platformio toolchain/compiler installs).
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: "1"
                memory: 1Gi
              limits:
                memory: 6Gi
    service:
      app:
        controller: esphome-builder
        type: LoadBalancer
        annotations:
          # Static IP from the cluster's existing CiliumLoadBalancerIPPool, so the
          # existing (external, non-cluster) ESPHome instance can dial this pod
          # directly for remote-build pairing. Confirm .15 is still free before
          # applying (check DHCP reservations / other lbipam.cilium.io/ips users).
          lbipam.cilium.io/ips: "192.168.42.15"
        externalTrafficPolicy: Cluster
        ports:
          peer-link:
            port: 6055
            targetPort: 6055
            protocol: TCP
    persistence:
      identity:
        enabled: true
        type: persistentVolumeClaim
        storageClass: qnap-nfs
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /var/lib/esphome-builder
      cache:
        enabled: true
        type: persistentVolumeClaim
        storageClass: qnap-nfs
        accessMode: ReadWriteOnce
        size: 20Gi
        globalMounts:
          - path: /cache
