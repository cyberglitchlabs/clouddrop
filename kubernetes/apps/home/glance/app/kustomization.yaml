---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: home
components:
  - ../../../../components/helmrelease-defaults
configMapGenerator:
  - name: glance-config
    files:
      - glance.yml=./config/glance.yml
generatorOptions:
  disableNameSuffixHash: true
resources:
  - ./helmrelease.yaml
