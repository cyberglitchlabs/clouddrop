- Downloads:
    - SABnzbd:
        icon: sabnzbd.png
        href: https://sabnzbd.${SECRET_DOMAIN}
        description: Usenet downloader
        widget:
          type: sabnzbd
          url: http://sabnzbd.media.svc.cluster.local:8080
          key: "{{HOMEPAGE_VAR_SABNZBD_API_KEY}}"
    - Prowlarr:
        icon: prowlarr.png
        href: https://prowlarr.${SECRET_DOMAIN}
        description: Indexer manager
        widget:
          type: prowlarr
          url: http://prowlarr.media.svc.cluster.local:9696
          key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"

- Media Management:
    - Sonarr:
        icon: sonarr.png
        href: https://sonarr.${SECRET_DOMAIN}
        description: TV series
        widget:
          type: sonarr
          url: http://sonarr.media.svc.cluster.local:8989
          key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
          enableQueue: true
    - Radarr:
        icon: radarr.png
        href: https://radarr.${SECRET_DOMAIN}
        description: Movies
        widget:
          type: radarr
          url: http://radarr.media.svc.cluster.local:7878
          key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
          enableQueue: true
    - Lidarr:
        icon: lidarr.png
        href: https://lidarr.${SECRET_DOMAIN}
        description: Music
        widget:
          type: lidarr
          url: http://lidarr.media.svc.cluster.local:8686
          key: "{{HOMEPAGE_VAR_LIDARR_API_KEY}}"
    - Bazarr:
        icon: bazarr.png
        href: https://bazarr.${SECRET_DOMAIN}
        description: Subtitles
        widget:
          type: bazarr
          url: http://bazarr.media.svc.cluster.local:6767
          key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"

- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: https://jellyfin.${SECRET_DOMAIN}
        description: Media server
        widget:
          type: jellyfin
          url: http://jellyfin.media.svc.cluster.local:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
          version: 2
          enableBlocks: true
          enableNowPlaying: true
    - Seerr:
        icon: seerr.png
        href: https://seerr.${SECRET_DOMAIN}
        description: Media requests
        widget:
          type: seerr
          url: http://seerr.media.svc.cluster.local:5055
          key: "{{HOMEPAGE_VAR_JELLYSEERR_API_KEY}}"
    - Immich:
        icon: immich.png
        href: https://immich.${SECRET_DOMAIN}
        description: Photos
        widget:
          type: immich
          url: http://immich-server.media.svc.cluster.local:2283
          key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
          version: 2

- Monitoring:
    - Grafana:
        icon: grafana.png
        href: https://grafana.${SECRET_DOMAIN}
        description: Metrics dashboards
        widget:
          type: grafana
          url: http://grafana.observability.svc.cluster.local:80
          username: ""
          password: "{{HOMEPAGE_VAR_GRAFANA_TOKEN}}"
    - Gatus:
        icon: gatus.png
        href: https://gatus.${SECRET_DOMAIN}
        description: Uptime monitoring
        widget:
          type: gatus
          url: http://gatus.observability.svc.cluster.local:8080
