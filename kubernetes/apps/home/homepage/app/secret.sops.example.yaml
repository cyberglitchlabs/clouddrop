---
# IMPORTANT: This file must be SOPS-encrypted before committing.
# After filling in your API keys below, run:
#   sops --encrypt --in-place kubernetes/apps/home/homepage/app/secret.sops.yaml
#
# TODO — fill in these API keys before encrypting:
#   HOMEPAGE_VAR_SONARR_API_KEY    — Sonarr Settings > General > API Key
#   HOMEPAGE_VAR_RADARR_API_KEY    — Radarr Settings > General > API Key
#   HOMEPAGE_VAR_LIDARR_API_KEY    — Lidarr Settings > General > API Key
#   HOMEPAGE_VAR_PROWLARR_API_KEY  — Prowlarr Settings > General > API Key
#   HOMEPAGE_VAR_SABNZBD_API_KEY   — SABnzbd Config > General > API Key
#   HOMEPAGE_VAR_BAZARR_API_KEY    — Bazarr Settings > General > API Key
#   HOMEPAGE_VAR_JELLYFIN_API_KEY  — Jellyfin Dashboard > API Keys
#   HOMEPAGE_VAR_JELLYSEERR_API_KEY — Jellyseerr/Seerr Settings > General > API Key
#   HOMEPAGE_VAR_IMMICH_API_KEY    — Immich Account Settings > API Keys
#   HOMEPAGE_VAR_GRAFANA_TOKEN     — Grafana Service Account token with Viewer role
apiVersion: v1
kind: Secret
metadata:
  name: homepage-widget-keys
  namespace: home
stringData:
  HOMEPAGE_VAR_SONARR_API_KEY: "CHANGEME"
  HOMEPAGE_VAR_RADARR_API_KEY: "CHANGEME"
  HOMEPAGE_VAR_LIDARR_API_KEY: "CHANGEME"
  HOMEPAGE_VAR_PROWLARR_API_KEY: "CHANGEME"
  HOMEPAGE_VAR_SABNZBD_API_KEY: "CHANGEME"
  HOMEPAGE_VAR_BAZARR_API_KEY: "CHANGEME"
  HOMEPAGE_VAR_JELLYFIN_API_KEY: "CHANGEME"
  HOMEPAGE_VAR_JELLYSEERR_API_KEY: "CHANGEME"
  HOMEPAGE_VAR_IMMICH_API_KEY: "CHANGEME"
  HOMEPAGE_VAR_GRAFANA_TOKEN: "CHANGEME"
