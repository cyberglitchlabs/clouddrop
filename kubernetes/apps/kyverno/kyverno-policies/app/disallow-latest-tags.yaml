---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Mutable Image Tags
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      Mutable image tags (latest, develop, nightly, canary) can cause
      unexpected changes when images are updated. This policy audits Pods
      using such tags. Audit mode only — no pods are blocked.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Mutable image tag detected. Use an immutable tag (e.g. a specific version or digest)."
        foreach:
          - list: "request.object.spec.[initContainers, containers][]"
            deny:
              conditions:
                any:
                  - key: "{{element.image | split(@, ':') | [-1:] | [0]}}"
                    operator: AnyIn
                    value:
                      - latest
                      - develop
                      - nightly
                      - canary
