---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kyverno
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    features:
      forceFailurePolicyIgnore:
        # If Kyverno is unavailable, pods still schedule (no deadlock)
        enabled: true

    webhooks:
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kube-system
              - flux-system

    admissionController:
      replicas: 1
      initContainer:
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 256Mi
      container:
        resources:
          requests:
            cpu: 100m
          limits:
            memory: 384Mi

    backgroundController:
      resources:
        requests:
          cpu: 10m
        limits:
          memory: 128Mi

    cleanupController:
      resources:
        requests:
          cpu: 10m
        limits:
          memory: 128Mi

    reportsController:
      resources:
        requests:
          cpu: 10m
        limits:
          memory: 128Mi
