---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: gpu-operator
      # renovate: datasource=helm depName=gpu-operator registryUrl=https://nvidia.github.io/gpu-operator
      version: "v26.3.3"
      sourceRef:
        kind: HelmRepository
        name: nvidia-gpu-operator
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    operator:
      defaultRuntime: containerd

    # Talos provides drivers and toolkit via system extensions
    driver:
      enabled: false
    toolkit:
      enabled: false

    hostPaths:
      driverInstallDir: /usr/local

    devicePlugin:
      enabled: true
      config:
        name: gpu-time-slicing-config
        default: "any"

    # dcgm and dcgmExporter are managed separately via dcgm-exporter HelmRelease
    dcgm:
      enabled: false
    dcgmExporter:
      enabled: false

    gfd:
      enabled: true

    migManager:
      enabled: false
    nodeStatusExporter:
      enabled: false

    daemonsets:
      priorityClassName: system-node-critical
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: extensions.talos.dev/nonfree-kmod-nvidia-production
                    operator: Exists
