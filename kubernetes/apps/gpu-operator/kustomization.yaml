---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gpu-operator
components:
  - ../../components/common
resources:
  - ./gpu-operator/ks.yaml
patches:
  - patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: gpu-operator
        labels:
          pod-security.kubernetes.io/enforce: privileged
    target:
      kind: Namespace
