---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: observability
  labels:
    app.kubernetes.io/name: vector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vector
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vector
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: vector
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vector
          image: timberio/vector:0.55.0-debian
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/vector/vector.yaml"]
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: syslog-tcp
              containerPort: 6514
              protocol: TCP
            - name: syslog-udp
              containerPort: 6514
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: secrets
              mountPath: /etc/vector/secrets
              readOnly: true
            - name: data
              mountPath: /var/lib/vector
            - name: var-log-pods
              mountPath: /var/log/pods
              readOnly: true
            - name: var-lib-docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: secrets
          secret:
            secretName: vector-indexer-auth
        - name: data
          emptyDir: {}
        - name: var-log-pods
          hostPath:
            path: /var/log/pods
        - name: var-lib-docker-containers
          hostPath:
            path: /var/lib/docker/containers
