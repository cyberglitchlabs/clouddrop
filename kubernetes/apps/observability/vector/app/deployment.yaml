---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector
  namespace: observability
  labels:
    app.kubernetes.io/name: vector
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: vector
          image: timberio/vector:0.42.0-debian
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/vector/vector.yaml"]
          ports:
            - name: syslog-tcp
              containerPort: 6514
              protocol: TCP
            - name: syslog-udp
              containerPort: 6514
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: data
              mountPath: /var/lib/vector
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: data
          emptyDir: {}
