---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: observability
data:
  vector.yaml: |
    sources:
      syslog_tcp:
        type: syslog
        address: "0.0.0.0:6514"
        mode: tcp

      raw_udp:
        type: socket
        address: "0.0.0.0:6514"
        mode: udp

      kubernetes_logs:
        type: kubernetes_logs

    transforms:
      parse_udp:
        type: remap
        inputs: ["raw_udp"]
        source: |-
          structured = parse_syslog(.message) ?? {}
          . = merge(., structured)
          if !exists(.hostname) {
            .hostname = "unknown"
          }

      enrich:
        type: remap
        inputs: ["syslog_tcp", "parse_udp"]
        source: |-
          .hostname = to_string!(.hostname)

      k8s_enrich:
        type: remap
        inputs: ["kubernetes_logs"]
        source: |-
          .hostname = to_string(.kubernetes.pod_name) ?? "unknown"
          .appname   = to_string(.kubernetes.container_name) ?? "unknown"
          .message   = to_string(.message) ?? ""

      wazuh_format:
        type: remap
        inputs: ["enrich", "k8s_enrich"]
        source: |-
          ts = format_timestamp!(.timestamp, format: "%b %e %H:%M:%S")
          priority = to_string(.priority) ?? "13"
          host = to_string!(.hostname)
          app = to_string(.appname) ?? "unknown"
          msg = to_string!(.message)
          .message = "<" + priority + ">" + ts + " " + host + " " + app + ": " + msg

    sinks:
      loki_out:
        type: loki
        inputs: ["enrich", "k8s_enrich"]
        endpoint: "http://loki-gateway.observability.svc.cluster.local"
        labels:
          job: "syslog"
          host: "{{ hostname }}"
        encoding:
          codec: json

      wazuh_out:
        type: socket
        inputs: ["wazuh_format"]
        address: "wazuh-manager.security.svc.cluster.local:514"
        mode: tcp
        encoding:
          codec: text
