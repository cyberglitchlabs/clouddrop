---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: observability
data:
  vector.yaml: |
    sources:
      syslog_tcp:
        type: syslog
        address: "0.0.0.0:6514"
        mode: tcp

      syslog_udp:
        type: syslog
        address: "0.0.0.0:6514"
        mode: udp

    transforms:
      enrich:
        type: remap
        inputs: ["syslog_tcp", "syslog_udp"]
        source: |-
          .hostname = to_string(.hostname)

      wazuh_format:
        type: remap
        inputs: ["enrich"]
        source: |-
          ts = format_timestamp!(.timestamp, format: "%b %e %H:%M:%S")
          priority = to_string(.priority)
          host = to_string(.hostname)
          app = to_string(.appname)
          msg = to_string(.message)
          .message = "<" + priority + ">" + ts + " " + host + " " + app + ": " + msg

    sinks:
      loki_out:
        type: loki
        inputs: ["enrich"]
        endpoint: "http://loki-gateway.observability.svc.cluster.local"
        labels:
          job: "syslog"
          host: "{{ hostname }}"
        encoding:
          codec: json

      wazuh_out:
        type: socket
        inputs: ["wazuh_format"]
        address: "wazuh-manager.security.svc.cluster.local:514"
        mode: tcp
        encoding:
          codec: text
