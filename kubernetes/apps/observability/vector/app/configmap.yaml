---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: observability
data:
  vector.yaml: |
    secret:
      indexer:
        type: directory
        path: /etc/vector/secrets
        remove_trailing_whitespace: true

    sources:
      syslog_tcp:
        type: syslog
        address: "0.0.0.0:6514"
        mode: tcp

      raw_udp:
        type: socket
        address: "0.0.0.0:6514"
        mode: udp

      kubernetes_logs:
        type: kubernetes_logs

    transforms:
      parse_udp:
        type: remap
        inputs: ["raw_udp"]
        source: |-
          structured = parse_syslog(.message) ?? {}
          . = merge(., structured)
          if !exists(.hostname) {
            .hostname = "unknown"
          }

      syslog_enrich:
        type: remap
        inputs: ["syslog_tcp", "parse_udp"]
        source: |-
          .hostname = to_string!(.hostname)

      wazuh_format:
        type: remap
        inputs: ["syslog_enrich"]
        source: |-
          ts = format_timestamp!(.timestamp, format: "%b %e %H:%M:%S")
          priority = to_string(.priority) ?? "13"
          host = to_string!(.hostname)
          app = to_string(.appname) ?? "unknown"
          msg = to_string!(.message)
          .message = "<" + priority + ">" + ts + " " + host + " " + app + ": " + msg

      k8s_enrich:
        type: remap
        inputs: ["kubernetes_logs"]
        source: |-
          .pod = to_string(.kubernetes.pod_name) ?? "unknown"
          .container = to_string(.kubernetes.container_name) ?? "unknown"
          .namespace = to_string(.kubernetes.pod_namespace) ?? "unknown"
          .node = to_string(.kubernetes.pod_node_name) ?? "unknown"
          .message = to_string(.message) ?? ""

    sinks:
      wazuh_manager:
        type: socket
        inputs: ["wazuh_format"]
        address: "wazuh-manager.security.svc.cluster.local:514"
        mode: tcp
        encoding:
          codec: text
        buffer:
          type: memory
          max_events: 5000
          when_full: drop_newest

      wazuh_indexer:
        type: elasticsearch
        inputs: ["k8s_enrich"]
        endpoints:
          - "https://wazuh-indexer.security.svc.cluster.local:9200"
        api_version: v7
        mode: bulk
        bulk:
          index: "vector-k8s-%Y.%m.%d"
        compression: none
        auth:
          strategy: basic
          user: admin
          password: "SECRET[indexer.INDEXER_ADMIN_PASSWORD]"
        tls:
          verify_certificate: false
          verify_hostname: false
        buffer:
          type: memory
          max_events: 10000
          when_full: drop_newest
