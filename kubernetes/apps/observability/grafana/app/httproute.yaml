---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: observability
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Grafana"
    gethomepage.dev/group: "Observability"
    gethomepage.dev/icon: "grafana.png"
    gethomepage.dev/description: "Metrics & Dashboards"
    gethomepage.dev/href: "https://grafana.${SECRET_DOMAIN}"
    gethomepage.dev/widget.type: "grafana"
    gethomepage.dev/widget.url: "http://grafana.observability.svc.cluster.local:80"
    gethomepage.dev/widget.username: "admin"
    gethomepage.dev/widget.password: "{{HOMEPAGE_VAR_GRAFANA_TOKEN}}"
spec:
  parentRefs:
    - name: external
      namespace: kube-system
      sectionName: https
  hostnames:
    - grafana.${SECRET_DOMAIN}
  rules:
    - backendRefs:
        - name: grafana
          port: 80
