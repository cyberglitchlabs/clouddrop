---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: victoria-logs
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  parentRefs:
    - name: internal
      namespace: kube-system
      sectionName: https
  hostnames:
    - logs.${SECRET_DOMAIN}
  rules:
    - backendRefs:
        - name: victoria-logs-victoria-logs-single-server
          port: 9428
