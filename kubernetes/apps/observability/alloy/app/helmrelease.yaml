---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 1h
  chart:
    spec:
      chart: alloy
      version: "1.7.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controller:
      type: daemonset
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    serviceAccount:
      create: false
      name: alloy

    extraEnv:
      - name: HOSTNAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName

    alloy:
      configMap:
        content: |
          // Kubernetes pod log discovery
          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pods.targets

            // Only collect logs from pods running on this node
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              action        = "keep"
              regex         = sys.env("HOSTNAME")
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "app"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
          }

          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pod_logs.output
            forward_to = [loki.write.victoria.receiver]
          }

          // Promote __syslog_* internal labels before they are stripped.
          // relabel_rules is the only opportunity to access these — they
          // do not survive into loki.process.
          loki.relabel "syslog_meta" {
            forward_to = []

            rule {
              source_labels = ["__syslog_message_hostname"]
              target_label  = "hostname"
            }
            rule {
              source_labels = ["__syslog_message_app_name"]
              target_label  = "app_name"
            }
            rule {
              source_labels = ["__syslog_message_severity"]
              target_label  = "level"
            }
            rule {
              source_labels = ["__syslog_message_facility"]
              target_label  = "facility"
            }
          }

          // Extract structured fields from syslog message bodies.
          loki.process "syslog" {
            forward_to = [loki.write.victoria.receiver]

            // Extract app_name from message body when RFC 3164 TAG is not parsed.
            // UniFi embeds the process inline: "hostname process[pid]: message"
            stage.regex {
              expression = `(?:^|\s)(?P<app_name_extracted>[\w\-]+)\[\d+\]:`
            }
            stage.labels {
              values = {
                app_name_extracted = "app_name",
              }
            }

            // Kernel firewall lines: [WAN_IN-DROP-3000]IN=eth4 SRC=... DST=... PROTO=TCP DPT=443
            // Match on content since app_name may be empty for RFC 3164 messages.
            stage.match {
              selector = `{job="syslog"} |= "]IN=" |= "SRC=" |= "DST="`

              stage.regex {
                expression = `\[(?P<fw_rule>[^\]]+)\].*PROTO=(?P<proto>\S+)`
              }
              stage.labels {
                values = {
                  fw_rule = "",
                  proto   = "",
                }
              }
            }
          }

          // Network syslog
          loki.source.syslog "network" {
            listener {
              address                         = "0.0.0.0:6514"
              protocol                        = "tcp"
              syslog_format                   = "rfc3164"
              use_incoming_timestamp          = true
              rfc3164_default_to_current_year = true
              labels                          = {job = "syslog"}
            }
            listener {
              address                         = "0.0.0.0:6514"
              protocol                        = "udp"
              syslog_format                   = "rfc3164"
              use_incoming_timestamp          = true
              rfc3164_default_to_current_year = true
              labels                          = {job = "syslog"}
            }
            relabel_rules = loki.relabel.syslog_meta.rules
            forward_to    = [loki.process.syslog.receiver]
          }

          // Victoria-Logs (Loki-compatible ingest API)
          loki.write "victoria" {
            endpoint {
              url = "http://victoria-logs-victoria-logs-single-server.observability.svc.cluster.local:9428/insert/loki/api/v1/push"
            }
          }

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
