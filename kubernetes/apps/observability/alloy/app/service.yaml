---
# Applied in Phase 7 after Vector is removed — both services cannot claim 192.168.42.14 simultaneously.
apiVersion: v1
kind: Service
metadata:
  name: alloy-syslog-tcp
  namespace: observability
  annotations:
    lbipam.cilium.io/ips: "192.168.42.14"
    lbipam.cilium.io/sharing-key: "alloy-syslog"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: alloy
  ports:
    - name: syslog-tcp
      port: 514
      targetPort: 6514
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: alloy-syslog-udp
  namespace: observability
  annotations:
    lbipam.cilium.io/ips: "192.168.42.14"
    lbipam.cilium.io/sharing-key: "alloy-syslog"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: alloy
  ports:
    - name: syslog-udp
      port: 514
      targetPort: 6514
      protocol: UDP
