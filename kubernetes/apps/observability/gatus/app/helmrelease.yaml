---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
# yayamlls-disable-file
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
    namespace: flux-system
  interval: 1h
  values:
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    gatus:
      env:
        TZ: America/Chicago
      extraEnv:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: gatus-postgres-app
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gatus-postgres-app
              key: password
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: gatus-postgres-app
              key: dbname
    sidecar:
      kinds:
        httproute:
          enable: true
          auto: true
        service:
          enable: false
    config:
      existingConfigMap: gatus-config
      items:
        - key: config.yaml
          path: config.yaml
    monitoring:
      serviceMonitor:
        enabled: true
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
      hostnames:
        - "gatus.${SECRET_DOMAIN}"
      parentRefs:
        - name: internal
          namespace: kube-system
          sectionName: https
