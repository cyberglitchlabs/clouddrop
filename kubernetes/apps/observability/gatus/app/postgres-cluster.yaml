---
# yaml-language-server: $schema=https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.30
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gatus-postgres
  namespace: observability
spec:
  instances: 1
  # Single-instance: no replica to fail over to, so the default PDB would
  # permanently block draining this node. CNPG's official replacement for
  # nodeMaintenanceWindow: https://cloudnative-pg.io/documentation/current/kubernetes_upgrade/
  enablePDB: false

  imageName: ghcr.io/cloudnative-pg/postgresql:18.4

  postgresql:
    parameters:
      max_connections: "20"
      shared_buffers: 64MB

  storage:
    size: 2Gi
    storageClass: qnap-nfs-db

  monitoring:
    enablePodMonitor: true
