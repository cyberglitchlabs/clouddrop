---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: bjw-s-app-template
    namespace: flux-system
  values:
    controllers:
      litellm:
        strategy: RollingUpdate
        initContainers:
          prisma-migrate:
            image:
              repository: ghcr.io/berriai/litellm-database
              tag: main-v1.87.1
            command: ["/bin/sh", "-c"]
            args:
              - cd /app && prisma migrate deploy --schema=schema.prisma
            env:
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm-postgres-app
                    key: uri
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm-database
              tag: main-v1.87.1
            args:
              - "--config"
              - "/app/config.yaml"
              - "--port"
              - "4000"
              - "--num_workers"
              - "1"
            env:
              TZ: America/Chicago
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm-postgres-app
                    key: uri
              STORE_MODEL_IN_DB: "True"
            envFrom:
              - secretRef:
                  name: litellm-secrets
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: 4000
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/readiness
                    port: 4000
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: litellm
        ports:
          http:
            port: 4000
    persistence:
      config:
        type: configMap
        name: litellm-config
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
        hostnames: ["litellm.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
