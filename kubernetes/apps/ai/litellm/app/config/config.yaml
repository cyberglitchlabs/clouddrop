model_list:
  # Local inference via exo on host machine
  - model_name: gemma-4-e2b
    litellm_params:
      model: openai/mlx-community/gemma-4-e2b-it-4bit
      api_base: http://192.168.100.93:52415/v1
      api_key: none

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: false
  json_logs: true
  request_timeout: 600
  callbacks: ["prometheus"]

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
