---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  interval: 1h
  chart:
    spec:
      chart: openclaw
      version: "1.5.17"
      sourceRef:
        kind: HelmRepository
        name: openclaw-helm
        namespace: ai
      interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    app-template:
      # Overwrite config on every start so GitOps values always win
      configMode: overwrite

      # Disable ClawHub skill installation (requires internet, not needed for Ollama-only)
      skills: []

      controllers:
        main:
          containers:
            main:
              envFrom:
                - secretRef:
                    name: openclaw-secrets

            # Disable Chromium sidecar — not needed for Ollama-only setup
            chromium:
              enabled: false

      configMaps:
        config:
          data:
            openclaw.json: |
              {
                "gateway": {
                  "port": 18789,
                  "mode": "local",
                  "trustedProxies": [],
                  "auth": {
                    "mode": "token",
                    "token": "${OPENCLAW_GATEWAY_TOKEN}"
                  },
                  "controlUi": {
                    "dangerouslyAllowHostHeaderOriginFallback": true
                  }
                },
                "agents": {
                  "defaults": {
                    "workspace": "/home/node/.openclaw/workspace",
                    "model": {
                      "primary": "ollama/phi3.5:latest"
                    },
                    "userTimezone": "UTC",
                    "timeoutSeconds": 600,
                    "maxConcurrent": 1,
                    "compaction": {
                      "reserveTokensFloor": 4096
                    }
                  },
                  "list": [
                    {
                      "id": "main",
                      "default": true,
                      "identity": {
                        "name": "OpenClaw",
                        "emoji": "🦞"
                      }
                    }
                  ]
                },
                "models": {
                  "providers": {
                    "ollama": {
                      "baseUrl": "http://ollama.ai.svc.cluster.local:11434",
                      "apiKey": "ollama-local",
                      "api": "ollama",
                      "models": [
                        {
                          "id": "phi3.5:latest",
                          "name": "Phi 3.5 Mini",
                          "reasoning": false,
                          "input": ["text"],
                          "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                          "contextWindow": 131072,
                          "maxTokens": 4096
                        }
                      ]
                    }
                  }
                },
                "session": {
                  "scope": "per-sender",
                  "store": "/home/node/.openclaw/sessions",
                  "reset": {
                    "mode": "idle",
                    "idleMinutes": 60
                  }
                },
                "logging": {
                  "level": "info",
                  "consoleLevel": "info",
                  "consoleStyle": "compact",
                  "redactSensitive": "tools"
                },
                "tools": {
                  "profile": "full",
                  "web": {
                    "search": { "enabled": false },
                    "fetch": { "enabled": true }
                  }
                }
              }

      persistence:
        data:
          storageClass: qnap-nfs
          accessMode: ReadWriteMany
          size: 5Gi
