---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openclaw
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
    gatus.home-operations.com/endpoint: |-
      group: ai
      conditions:
        - "[STATUS] == 200"
spec:
  hostnames:
    - "openclaw.${SECRET_DOMAIN}" # yayamlls-disable-line
  parentRefs:
    - name: internal
      namespace: kube-system
      sectionName: https
  rules:
    - backendRefs:
        - name: openclaw
          port: 18789
