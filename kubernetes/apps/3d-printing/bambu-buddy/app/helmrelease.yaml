---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bambu-buddy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: bjw-s-app-template
    namespace: flux-system
  dependsOn:
    - name: cloudflare-tunnel
      namespace: network
  values:
    controllers:
      bambu-buddy:
        strategy: Recreate
        containers:
          bambu-buddy:
            image:
              repository: ghcr.io/maziggy/bambuddy
              tag: 0.2.4
            env:
              TZ: America/Chicago
              LOG_LEVEL: DEBUG
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                add: ["NET_BIND_SERVICE"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: "OnRootMismatch"
    service:
      app:
        controller: bambu-buddy
        ports:
          http:
            port: 8000
            targetPort: 8000
            protocol: TCP
      vp:
        controller: bambu-buddy
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.42.16"
        ports:
          bind:
            port: 3000
            targetPort: 3000
            protocol: TCP
          detect:
            port: 3002
            targetPort: 3002
            protocol: TCP
          ssdp:
            port: 2021
            targetPort: 2021
            protocol: UDP
          mqtt:
            port: 8883
            targetPort: 8883
            protocol: TCP
          ftps:
            port: 990
            targetPort: 990
            protocol: TCP
          tunnel:
            port: 6000
            targetPort: 6000
            protocol: TCP
          rtsp:
            port: 322
            targetPort: 322
            protocol: TCP
          a1p1s-1:
            port: 2024
            targetPort: 2024
            protocol: TCP
          a1p1s-2:
            port: 2025
            targetPort: 2025
            protocol: TCP
          a1p1s-3:
            port: 2026
            targetPort: 2026
            protocol: TCP
          ftp-passive-0:
            port: 50000
            targetPort: 50000
            protocol: TCP
          ftp-passive-1:
            port: 50001
            targetPort: 50001
            protocol: TCP
          ftp-passive-2:
            port: 50002
            targetPort: 50002
            protocol: TCP
          ftp-passive-3:
            port: 50003
            targetPort: 50003
            protocol: TCP
          ftp-passive-4:
            port: 50004
            targetPort: 50004
            protocol: TCP
          ftp-passive-5:
            port: 50005
            targetPort: 50005
            protocol: TCP
          ftp-passive-6:
            port: 50006
            targetPort: 50006
            protocol: TCP
          ftp-passive-7:
            port: 50007
            targetPort: 50007
            protocol: TCP
          ftp-passive-8:
            port: 50008
            targetPort: 50008
            protocol: TCP
          ftp-passive-9:
            port: 50009
            targetPort: 50009
            protocol: TCP
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: bambu-buddy-data
        globalMounts:
          - path: /app/data
      logs:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: bambu-buddy-logs
        globalMounts:
          - path: /app/logs
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
        hostnames: ["bambu.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 8000
