---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bindery
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: bjw-s-app-template
    namespace: flux-system
  dependsOn:
    - name: cloudflare-tunnel
      namespace: network
  values:
    controllers:
      bindery:
        strategy: RollingUpdate
        containers:
          bindery:
            image:
              repository: ghcr.io/vavallee/bindery
              tag: "v1.17.0"
            env:
              TZ: America/Chicago
              BINDERY_PUID: "568"
              BINDERY_PGID: "568"
              BINDERY_DATA_DIR: /config
              BINDERY_LIBRARY_DIR: /media/books
              BINDERY_DOWNLOAD_DIR: /media/downloads
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8787
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8787
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: bindery
        ports:
          http:
            port: 8787
            targetPort: 8787
            protocol: TCP
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: bindery-config-nfs
        globalMounts:
          - path: /config
      media:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: bindery-books-smb
        globalMounts:
          - path: /media
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 8787
