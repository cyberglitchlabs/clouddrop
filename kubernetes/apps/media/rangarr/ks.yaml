---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rangarr
  namespace: media
spec:
  targetNamespace: media
  path: ./kubernetes/apps/media/rangarr/app
  wait: false
  interval: 30m
  retryInterval: 1m
  dependsOn:
    - name: radarr
    - name: sonarr
    - name: lidarr
