---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rangarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: bjw-s-app-template
    namespace: flux-system
  values:
    controllers:
      rangarr:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: judochinx/rangarr
              tag: 0.7.0
            envFrom:
              - secretRef:
                  name: rangarr-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
    persistence:
      config:
        type: configMap
        name: rangarr-config
        globalMounts:
          - path: /app/config/config.yaml
            subPath: config.yaml
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
