---
# yaml-language-server: $schema=https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.30
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgres
  namespace: media
spec:
  instances: 1
  # Single-instance: no replica to fail over to, so the default PDB would
  # permanently block draining this node. CNPG's official replacement for
  # nodeMaintenanceWindow: https://cloudnative-pg.io/documentation/current/kubernetes_upgrade/
  enablePDB: false

  # Immich requires vectorchord extension for ML features
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17.5-0.4.3

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: 256MB
    shared_preload_libraries:
      - "vchord.so"

  bootstrap:
    initdb:
      postInitApplicationSQL:
        # Extensions required by Immich
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
        - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;

  storage:
    size: 10Gi
    storageClass: qnap-nfs

  monitoring:
    enablePodMonitor: true
