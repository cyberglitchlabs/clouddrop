---
# One-off migration job: copy Jellyfin config from NFS to JuiceFS.
# Apply manually with: kubectl apply -f job-migration-nfs-to-juicefs.yaml
# Monitor with: kubectl logs -n media -l job-name=jellyfin-config-migration -f
# Delete after verified: kubectl delete -f job-migration-nfs-to-juicefs.yaml
# DO NOT add this file to kustomization.yaml — it is not managed by Flux.
apiVersion: batch/v1
kind: Job
metadata:
  name: jellyfin-config-migration
  namespace: media
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: alpine:3.21
          command:
            - sh
            - -c
            - |
              set -e
              for f in jellyfin.db library.db playback_reporting.db device.txt splashscreen.png; do
                [ -f /source/data/$f ] && cp -av /source/data/$f /destination/$f
              done
              for d in playlists ScheduledTasks SQLiteBackups; do
                [ -d /source/data/$d ] && cp -av /source/data/$d/ /destination/$d/
              done
              echo DONE
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: source
              mountPath: /source
            - name: destination
              mountPath: /destination
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: jellyfin-nfs-v2
        - name: destination
          persistentVolumeClaim:
            claimName: jellyfin-juicefs
