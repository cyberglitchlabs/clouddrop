---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soulsync-nfs
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: qnap-nfs
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soulsync-config-nfs-v2
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: qnap-nfs-db-sync
  resources:
    requests:
      storage: 5Gi
