---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: soulsync
  namespace: media
spec:
  targetNamespace: media
  path: ./kubernetes/apps/media/soulsync/app
  decryption:
    provider: sops
  wait: false
  interval: 30m
  retryInterval: 1m
  dependsOn:
    - name: slskd
