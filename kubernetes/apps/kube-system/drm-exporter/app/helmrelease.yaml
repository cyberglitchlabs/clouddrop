---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: drm-exporter
    namespace: flux-system
  interval: 1h
  values:
    securityContext:
      capabilities:
        add:
          - PERFMON
          - SYS_RAWIO
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 128Mi
