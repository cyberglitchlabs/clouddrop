---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
spec:
  interval: 1h
  chart:
    spec:
      chart: descheduler
      version: 0.35.1
      sourceRef:
        kind: HelmRepository
        name: descheduler
        namespace: kube-system
      interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    kind: Deployment
    deschedulingInterval: 6h
    deschedulerPolicy:
      apiVersion: "descheduler/v1alpha2"
      profiles:
        - name: default
          pluginConfig:
            - name: DefaultEvictor
              args:
                nodeFit: true
            - name: LowNodeUtilization
              args:
                thresholds:
                  cpu: 40
                  memory: 40
                  pods: 40
                targetThresholds:
                  cpu: 80
                  memory: 60
                  pods: 80
          plugins:
            balance:
              enabled:
                - LowNodeUtilization
            deschedule:
              enabled:
                - RemovePodsViolatingNodeAffinity
                - RemovePodsViolatingInterPodAntiAffinity
                - RemoveDuplicates
                - RemovePodsViolatingTopologySpreadConstraint
    podAnnotations:
      configmap.reloader.stakater.com/reload: "descheduler"
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      fsGroup: 65532
