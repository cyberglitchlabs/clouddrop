---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: romm-postgres
  namespace: games
spec:
  instances: 1
  # Single-instance: no replica to fail over to, so the default PDB would
  # permanently block draining this node. CNPG's official replacement for
  # nodeMaintenanceWindow: https://cloudnative-pg.io/documentation/current/kubernetes_upgrade/
  enablePDB: false
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4
  primaryUpdateStrategy: unsupervised
  storage:
    size: 10Gi
    storageClass: qnap-nfs
  superuserSecret:
    name: romm-postgres-superuser
  enableSuperuserAccess: true
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 256MB
