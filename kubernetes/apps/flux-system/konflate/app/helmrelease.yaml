---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
    namespace: flux-system
  interval: 1h
  values:
    config:
      repo: github://cyberglitchlabs/clouddrop
      appClientId: Iv23li6bqSXpM84R3Bg5
      statusChecks: true
      prComments: true
      publicUrl: https://konflate.${SECRET_DOMAIN}
      mcp: true
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    secret:
      existingSecret: konflate-secret
    httpRoute:
      enabled: true
      annotations:
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
        gatus.home-operations.com/endpoint: |-
          group: flux
          conditions:
            - "[STATUS] == 200"
      parentRefs:
        - name: internal
          namespace: kube-system
          sectionName: https
      hostnames:
        - "konflate.${SECRET_DOMAIN}"
    monitoring:
      serviceMonitor:
        enabled: true
    persistence:
      enabled: true
      storageClass: qnap-nfs
      size: 5Gi
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
