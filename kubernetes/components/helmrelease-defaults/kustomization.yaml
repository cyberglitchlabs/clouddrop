---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: not-used
      spec:
        install:
          remediation:
            retries: -1
        upgrade:
          cleanupOnFail: true
          remediation:
            retries: 3
    target:
      group: helm.toolkit.fluxcd.io
      kind: HelmRelease
