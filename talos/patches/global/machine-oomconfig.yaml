apiVersion: v1alpha1
kind: OOMConfig
# Same as the Talos default, except the first clause now shares the same
# 10s cooldown the second clause already has. Without it, a sustained spike
# in System/Podruntime cgroup memory-pressure (e.g. containerd under a burst
# of concurrent pod churn during a node drain) re-triggers every sampleInterval
# (500ms) with no cooldown, repeatedly reaping already-dead cgroups instead of
# backing off. Ref: https://github.com/siderolabs/talos/issues/12526
triggerExpression: |-
    multiply_qos_vectors(d_qos_memory_full_total, {System: 8.0, Podruntime: 4.0}) > 3000.0 &&
    multiply_qos_vectors(qos_memory_full_avg10, {System: 1.0, Podruntime: 1.0}) > 5.0 &&
    time_since_trigger > duration("10s") ||
    memory_full_avg10 > 75.0 && time_since_trigger > duration("10s")
